<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#4A7FE0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Zoomly"/>
<title>Zoomly 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#EFF4FF;font-family:'Nunito',sans-serif;overscroll-behavior:none;}
::-webkit-scrollbar{display:none;}
textarea,input,select{font-family:'Nunito',sans-serif;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.fade{animation:fadeIn 0.25s ease;}
</style>
<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById('splash').innerHTML = '<div style="padding:40px;text-align:center;color:white;font-family:sans-serif"><p style="font-size:40px">⚠️</p><p style="font-size:16px;margin:16px 0">Erreur de chargement</p><p style="font-size:12px;opacity:0.8">'+msg+'</p><button onclick="location.reload()" style="margin-top:20px;padding:12px 24px;border-radius:16px;border:none;background:white;color:#4A7FE0;font-weight:bold;font-size:14px;cursor:pointer">🔄 Réessayer</button></div>';
};
</script>
</head>
<body>
<div id="root" style="max-width:430px;margin:0 auto;min-height:100vh;">
  <!-- Écran de chargement visible avant React -->
  <div id="splash" style="min-height:100vh;background:linear-gradient(160deg,#4A7FE0,#7B5CC4);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;">
    <div style="background:white;border-radius:28px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,0.15);">
      <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="80" height="80" style="border-radius:16px;background:#EFF4FF;"/>
    </div>
    <p style="color:white;font-family:Georgia,serif;font-size:22px;margin:0;">Zoomly 🐾</p>
    <div style="display:flex;gap:6px;">
      <div style="width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.7);animation:b 1s ease 0s infinite;"></div>
      <div style="width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.7);animation:b 1s ease 0.2s infinite;"></div>
      <div style="width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.7);animation:b 1s ease 0.4s infinite;"></div>
    </div>
    <style>@keyframes b{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}</style>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const app = initializeApp({
  apiKey:"AIzaSyC1q2YdrnyiDMJGnvpuKQ-QksSN0UTziZM",
  authDomain:"zoomly-41976.firebaseapp.com",
  projectId:"zoomly-41976",
  storageBucket:"zoomly-41976.firebasestorage.app",
  messagingSenderId:"177537430867",
  appId:"1:177537430867:web:445e9eaa69eaf2bec01da6"
});
const auth = getAuth(app);
const db = getFirestore(app);
window._fb = {
  createUser:(e,p)=>createUserWithEmailAndPassword(auth,e,p),
  signIn:(e,p)=>signInWithEmailAndPassword(auth,e,p),
  signOut:()=>signOut(auth),
  onAuth:(cb)=>onAuthStateChanged(auth,cb),
  setDoc:(col,id,data)=>setDoc(doc(db,col,id),data),
  getDoc:(col,id)=>getDoc(doc(db,col,id)),
  updateDoc:(col,id,data)=>updateDoc(doc(db,col,id),data),
};
window.dispatchEvent(new Event("fb-ready"));
</script>
