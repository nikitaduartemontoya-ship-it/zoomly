<!DOCTYPE html>
<html lang="fr">
<head>

<title>Zoomly 🐾</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#EFF4FF;font-family:'Nunito',sans-serif;overscroll-behavior:none;}
::-webkit-scrollbar{display:none;}
textarea,input,select{font-family:'Nunito',sans-serif;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

<body>
<div id="root" style="max-width:430px;margin:0 auto;min-height:100vh;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const app = initializeApp({
  apiKey:"AIzaSyC1q2YdrnyiDMJGnvpuKQ-QksSN0UTziZM",
  authDomain:"zoomly-41976.firebaseapp.com",
  projectId:"zoomly-41976",
  storageBucket:"zoomly-41976.firebasestorage.app",
  messagingSenderId:"177537430867",
  appId:"1:177537430867:web:445e9eaa69eaf2bec01da6"
});
const auth = getAuth(app);
const db = getFirestore(app);
window._fb = {
  createUser:(e,p)=>createUserWithEmailAndPassword(auth,e,p),
  signIn:(e,p)=>signInWithEmailAndPassword(auth,e,p),
  signOut:()=>signOut(auth),
  onAuth:(cb)=>onAuthStateChanged(auth,cb),
  setDoc:(col,id,data)=>setDoc(doc(db,col,id),data),

  updateDoc:(col,id,data)=>updateDoc(doc(db,col,id),data),

<script src="mascot.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

const C={
  blue:"#4A7FE0",blueL:"#EFF4FF",blueM:"#C8D9F8",blueDark:"#2856B0",
  purple:"#7B5CC4",purpleL:"#EDE8FF",
  gold:"#E8A020",goldL:"#FFF3D6",
  brown:"#3C1E1E",cream:"#F8EFE0",
  text:"#1A2C5B",textL:"#6B82B8",
  white:"#FFFFFF",red:"#E05050",
  green:"#3DBE7A",greenL:"#E0F7EC",
  orange:"#F0802A",orangeL:"#FFF0E5",
  pink:"#E87FAA",pinkL:"#FFE8F2",
};

// MASCOT chargé depuis mascot.js

function Mascot({size=80}){
  return <img src={MASCOT} alt="Zoomly" style={{width:size,height:size,objectFit:"contain",display:"block"}}/>;
}

// ── UI ────────────────────────────────────────────────────
function Btn({children,onClick,disabled,outline,ghost,color,style={}}){
  const bg=disabled?C.blueM:outline||ghost?"transparent":color==="gold"?C.gold:color==="red"?C.red:color==="green"?C.green:color==="pink"?C.pink:"linear-gradient(135deg,"+C.blue+","+C.purple+")";
  const border=outline?"2px solid "+(color==="gold"?C.gold:color==="red"?C.red:color==="green"?C.green:C.blue):ghost?"2px solid "+C.blueM:"none";
  const col=disabled?C.textL:outline?(color==="gold"?C.gold:color==="red"?C.red:color==="green"?C.green:C.blue):ghost?C.textL:"white";
  return <button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"14px",borderRadius:16,border,background:bg,color:col,fontWeight:800,fontSize:14,cursor:disabled?"not-allowed":"pointer",fontFamily:"Nunito,sans-serif",opacity:disabled?0.5:1,...style}}>{children}</button>;
}

function Inp({label,value,onChange,type="text",placeholder="",multiline,rows=3}){
  const s={width:"100%",padding:"12px 16px",borderRadius:14,border:"2px solid "+C.blueM,fontSize:14,color:C.text,fontFamily:"Nunito,sans-serif",outline:"none",background:"white",resize:"none"};
  return <div style={{marginBottom:14}}>
    {label&&<p style={{margin:"0 0 6px",fontSize:13,fontWeight:700,color:C.text}}>{label}</p>}
    {multiline?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={s}/>
    :<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={s}/>}
  </div>;
}

function Card({children,style={},onClick}){
  return <div onClick={onClick} style={{background:"white",borderRadius:20,padding:"16px 18px",marginBottom:14,boxShadow:"0 2px 16px rgba(74,127,224,0.12)",...style}}>{children}</div>;
}

function Tag({children,color="blue",style={}}){
  const bg=color==="gold"?C.goldL:color==="green"?C.greenL:color==="purple"?C.purpleL:color==="pink"?C.pinkL:color==="orange"?C.orangeL:C.blueM;
  const col=color==="gold"?C.gold:color==="green"?C.green:color==="purple"?C.purple:color==="pink"?C.pink:color==="orange"?C.orange:C.blue;
  return <span style={{background:bg,color:col,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,display:"inline-block",...style}}>{children}</span>;
}

function ScoreRing({score=74}){
  const r=42,c=2*Math.PI*r,col=score>75?C.green:score>40?C.gold:C.orange;
  return <svg width={110} height={110} viewBox="0 0 100 100">
    <circle cx="50" cy="50" r={r} fill="none" stroke={C.blueM} strokeWidth="10"/>
    <circle cx="50" cy="50" r={r} fill="none" stroke={col} strokeWidth="10" strokeLinecap="round"
      strokeDasharray={c} strokeDashoffset={c*(1-score/100)} transform="rotate(-90 50 50)"/>
    <text x="50" y="47" textAnchor="middle" fontSize="20" fontWeight="bold" fill={C.text} fontFamily="serif">{score}</text>
    <text x="50" y="60" textAnchor="middle" fontSize="9" fill={C.textL} fontFamily="sans-serif">/100</text>
  </svg>;
}

function Loader(){
  return <div style={{display:"flex",gap:6,justifyContent:"center",padding:"16px 0"}}>
    {[0,1,2].map(i=><span key={i} style={{width:8,height:8,borderRadius:"50%",background:C.blue,display:"inline-block",animation:"bounce 1s ease "+i*0.2+"s infinite"}}/>)}
  </div>;
}

// ── AUTH ──────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [pw2,setPw2]=useState("");
  const [err,setErr]=useState("");
  const [load,setLoad]=useState(false);

  const handle=async()=>{
    setErr("");setLoad(true);
    try{
      if(mode==="register"){
        if(pw!==pw2){setErr("Mots de passe différents.");setLoad(false);return;}
        if(pw.length<6){setErr("6 caractères minimum.");setLoad(false);return;}
        const c=await window._fb.createUser(email,pw);
        onAuth(c.user,true);
      }else{
        const c=await window._fb.signIn(email,pw);
        onAuth(c.user,false);
      }
    }catch(e){
      const m={"auth/email-already-in-use":"Email déjà utilisé.","auth/invalid-email":"Email invalide.","auth/wrong-password":"Mot de passe incorrect.","auth/user-not-found":"Aucun compte trouvé.","auth/invalid-credential":"Email ou mot de passe incorrect."};
      setErr(m[e.code]||"Erreur : "+e.message);
    }
    setLoad(false);
  };

  return <div style={{minHeight:"100vh",background:"linear-gradient(160deg,"+C.blue+" 0%,"+C.purple+" 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px"}}>
    <div style={{textAlign:"center",marginBottom:28}}>
      <div style={{background:"white",borderRadius:28,padding:16,display:"inline-block",marginBottom:16,boxShadow:"0 8px 32px rgba(0,0,0,0.15)"}}><Mascot size={90}/></div>
      <h1 style={{color:"white",fontFamily:"Georgia,serif",margin:"0 0 6px",fontSize:34}}>Zoomly</h1>
      <p style={{color:"rgba(255,255,255,0.85)",fontSize:14}}>Le compagnon santé de ton chien 🐾</p>
    </div>
    <div style={{width:"100%",maxWidth:400,background:"white",borderRadius:24,padding:24,boxShadow:"0 16px 48px rgba(0,0,0,0.2)"}}>
      <div style={{display:"flex",background:C.blueL,borderRadius:14,padding:4,marginBottom:20}}>
        {["login","register"].map(m=><button key={m} onClick={()=>{setMode(m);setErr("");}} style={{flex:1,padding:"10px",borderRadius:11,border:"none",cursor:"pointer",background:mode===m?"white":"transparent",color:mode===m?C.blue:C.textL,fontWeight:700,fontSize:13,fontFamily:"Nunito,sans-serif"}}>{m==="login"?"Connexion":"Créer un compte"}</button>)}
      </div>
      <Inp label="Email" type="email" value={email} onChange={setEmail} placeholder="ton@email.com"/>
      <Inp label="Mot de passe" type="password" value={pw} onChange={setPw} placeholder="••••••••"/>
      {mode==="register"&&<Inp label="Confirmer le mot de passe" type="password" value={pw2} onChange={setPw2} placeholder="••••••••"/>}
      {err&&<p style={{color:C.red,fontSize:13,margin:"0 0 12px",textAlign:"center",background:"#FFF0F0",padding:"8px",borderRadius:10}}>{err}</p>}
      <Btn onClick={handle} disabled={load||!email||!pw}>{load?"Chargement…":mode==="login"?"Se connecter 🐾":"Créer mon compte 🐾"}</Btn>
    </div>
    <p style={{color:"rgba(255,255,255,0.7)",fontSize:11,marginTop:16,textAlign:"center"}}>🔒 Données privées · Jamais revendues</p>
  </div>;
}

// ── ONBOARDING ────────────────────────────────────────────
const RACES_LIST=["Berger Australien","Border Collie","Labrador","Golden Retriever","Husky Sibérien","Berger Allemand","Bulldog Français","Chihuahua","Beagle","Caniche","Malinois","Rottweiler","Dalmatien","Shiba Inu","Berger Blanc Suisse","Jack Russell","Cocker Spaniel","Samoyède","Akita Inu","Dogue Allemand","Spitz","Yorkshire","Bichon","Carlin","Boxer","Dobermann","Setter Irlandais","Épagneul Breton","Schnauzer","Teckel","Basenji","Lévrier","Greyhound","Whippet","Shar Pei","Chow Chow"];
// ── FICHES RACES — générées par Gemini ───────────────────
const FICHES_RACES = {}; // Gemini génère les fiches dynamiquement


function FicheRace({race, onClose}) {
  const [fiche,setFiche]=useState(null);
  const [load,setLoad]=useState(true);
  const KEY="zoomly_fiche_"+race;

  useEffect(()=>{
    const cached=localStorage.getItem(KEY);
    if(cached){setFiche(JSON.parse(cached));setLoad(false);return;}
    callGemini(
      'Expert vétérinaire canin suisse. Génère une fiche race complète et précise. JSON VALIDE uniquement sans markdown: {"poids":"X-Xkg","dureeVie":"X-Xans","caractere":["trait1","trait2","trait3","trait4","trait5"],"energie":1-5,"socialisation":1-5,"dressage":1-5,"entretien":1-5,"exercice":"description exercice","alimentation":"besoins alimentaires précis","sante":["prédisposition1","prédisposition2","prédisposition3"],"toilettage":"description","enfants":"⭐x/5 — explication","conseil":"conseil clé important"}',
      "Race: "+race+". Sois précis et complet, adapté à la Suisse."
    ).then(t=>{
      try{
        const json=t.replace(/```json|```/g,"").trim();
        const f=JSON.parse(json);
        setFiche(f);
        localStorage.setItem(KEY,JSON.stringify(f));
      }catch{setFiche({poids:"variable",dureeVie:"10-15 ans",caractere:["Loyal","Affectueux","Joueur"],energie:3,socialisation:3,dressage:3,entretien:3,exercice:"30-60 min/jour",alimentation:"Alimentation équilibrée adaptée à la taille",sante:["Consulter le vétérinaire régulièrement"],toilettage:"Brossage régulier",enfants:"⭐⭐⭐⭐ Bon avec les enfants",conseil:"Chaque chien est unique — adaptez-vous à sa personnalité !"});}
      setLoad(false);
    });
  },[race]);

  const StarBar=({val,max=5,color=C.blue})=>(
    <div style={{display:"flex",gap:3}}>
      {Array.from({length:max}).map((_,i)=><div key={i} style={{width:20,height:8,borderRadius:4,background:i<val?color:C.blueM}}/>)}
    </div>
  );

  return <div style={{padding:"24px 16px"}} className="fade">
    <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:C.blue,fontWeight:700,fontSize:14,marginBottom:16,padding:0}}>← Retour au profil</button>
    <div style={{background:"linear-gradient(135deg,"+C.blue+","+C.purple+")",borderRadius:24,padding:"20px",marginBottom:14,textAlign:"center"}}>
      <h2 style={{color:"white",fontFamily:"Georgia,serif",fontSize:24,margin:"0 0 12px"}}>{race}</h2>
      {load?<p style={{color:"rgba(255,255,255,0.7)",fontSize:13}}>Génération de la fiche…</p>:
      <><p style={{color:"rgba(255,255,255,0.8)",fontSize:13,margin:"0 0 10px"}}>{fiche?.poids} · {fiche?.dureeVie}</p>
      <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
        {fiche?.caractere?.map(c=><span key={c} style={{background:"rgba(255,255,255,0.2)",color:"white",borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:700}}>{c}</span>)}
      </div></>}
    </div>
    {load?<Card><Loader/><p style={{textAlign:"center",color:C.textL,fontSize:13}}>Gemini génère la fiche de {race}…</p></Card>:<>
    <Card>
      <h4 style={{color:C.text,margin:"0 0 14px"}}>📊 Caractéristiques</h4>
      {[["Énergie",fiche?.energie,C.red],["Sociabilité",fiche?.socialisation,C.green],["Dressabilité",fiche?.dressage,C.blue],["Entretien",fiche?.entretien,C.purple]].map(([l,v,c])=><div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:13,color:C.textL,width:100}}>{l}</span>
        <StarBar val={v||3} color={c}/>
      </div>)}
    </Card>
    <Card><h4 style={{color:C.text,margin:"0 0 8px"}}>🏃 Exercice</h4><p style={{margin:0,fontSize:13,color:C.text,lineHeight:1.6}}>{fiche?.exercice}</p></Card>
    <Card><h4 style={{color:C.text,margin:"0 0 8px"}}>🍽️ Alimentation</h4><p style={{margin:0,fontSize:13,color:C.text,lineHeight:1.6}}>{fiche?.alimentation}</p></Card>
    <Card><h4 style={{color:C.text,margin:"0 0 10px"}}>🏥 Prédispositions santé</h4>{fiche?.sante?.map((s,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:6}}><span style={{color:C.orange}}>⚠️</span><p style={{margin:0,fontSize:13,color:C.text}}>{s}</p></div>)}</Card>
    <Card><h4 style={{color:C.text,margin:"0 0 8px"}}>✂️ Toilettage</h4><p style={{margin:0,fontSize:13,color:C.text,lineHeight:1.6}}>{fiche?.toilettage}</p></Card>
    <Card><h4 style={{color:C.text,margin:"0 0 6px"}}>👶 Avec les enfants</h4><p style={{margin:0,fontSize:14,color:C.text}}>{fiche?.enfants}</p></Card>
    <Card style={{background:C.goldL}}><h4 style={{color:C.gold,margin:"0 0 8px"}}>💡 Conseil clé</h4><p style={{margin:0,fontSize:13,color:C.text,lineHeight:1.6}}>{fiche?.conseil}</p></Card>
    </>}
  </div>;
}


function Onboarding({user,onDone}){
  const [step,setStep]=useState(0);
  const [d,setD]=useState({name:"",birthday:"",isCroise:false,races:[],raceLibre:"",age:"",ageUnit:"mois",weight:"",sex:"female",sterilized:"yes",notes:""});
  const [load,setLoad]=useState(false);
  const [search,setSearch]=useState("");
  const set=(k,v)=>setD(p=>({...p,[k]:v}));

  const toggleRace=r=>{
    if(d.races.includes(r))set("races",d.races.filter(x=>x!==r));
    else if(d.races.length<4)set("races",[...d.races,r]);
  };

  const save=async()=>{
    setLoad(true);
    const raceLabel=d.isCroise?(d.races.length>0?"Croisé "+d.races.join(" × "):(d.raceLibre||"Croisé")):d.races[0]||"Race inconnue";
    const dog={...d,raceLabel,createdAt:new Date().toISOString()};
    await window._fb.setDoc("users",user.uid,{dog,email:user.email});
    onDone(dog);
  };

  const filtered=RACES_LIST.filter(r=>r.toLowerCase().includes(search.toLowerCase()));
  const canNext=[true,!!d.name,d.isCroise?(d.races.length>0||!!d.raceLibre):d.races.length>0,!!d.age&&!!d.weight,true];

  const steps=[
    <div style={{textAlign:"center"}} className="fade">
      <Mascot size={100}/>
      <h2 style={{color:C.text,fontFamily:"Georgia,serif",fontSize:24,margin:"16px 0 10px"}}>Bienvenue sur Zoomly ! 🐾</h2>
      <p style={{color:C.textL,fontSize:14,lineHeight:1.7,margin:"0 0 24px"}}>Créons le profil de ton chien pour des conseils vraiment personnalisés !</p>
      <Btn onClick={()=>setStep(1)}>C'est parti ! →</Btn>
    </div>,

    <div className="fade">
      <h3 style={{color:C.text,fontFamily:"Georgia,serif",fontSize:20,margin:"0 0 16px"}}>Ton chien 🐶</h3>
      <Inp label="Prénom" value={d.name} onChange={v=>set("name",v)} placeholder="Ex: Myra"/>
      <Inp label="Date de naissance" type="date" value={d.birthday} onChange={v=>set("birthday",v)}/>
      <p style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:C.text}}>Sexe</p>
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        {[["female","♀ Femelle"],["male","♂ Mâle"]].map(([v,l])=><button key={v} onClick={()=>set("sex",v)} style={{flex:1,padding:"12px",borderRadius:14,cursor:"pointer",fontWeight:700,fontSize:14,border:"2px solid "+(d.sex===v?C.blue:C.blueM),background:d.sex===v?C.blueL:"white",color:d.sex===v?C.blue:C.textL,fontFamily:"Nunito,sans-serif"}}>{l}</button>)}
      </div>
      <p style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:C.text}}>Stérilisé·e ?</p>
      <div style={{display:"flex",gap:10}}>
        {[["yes","✓ Oui"],["no","✗ Non"]].map(([v,l])=><button key={v} onClick={()=>set("sterilized",v)} style={{flex:1,padding:"11px",borderRadius:14,cursor:"pointer",fontWeight:700,fontSize:13,border:"2px solid "+(d.sterilized===v?C.blue:C.blueM),background:d.sterilized===v?C.blueL:"white",color:d.sterilized===v?C.blue:C.textL,fontFamily:"Nunito,sans-serif"}}>{l}</button>)}
      </div>
    </div>,

    <div className="fade">
      <h3 style={{color:C.text,fontFamily:"Georgia,serif",fontSize:20,margin:"0 0 6px"}}>Race 🏷️</h3>
      <p style={{color:C.textL,fontSize:13,margin:"0 0 14px"}}>Les conseils seront adaptés à sa race</p>
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        {[[false,"Race pure 🐕"],[true,"Croisé 🐕‍🦺"]].map(([v,l])=><button key={String(v)} onClick={()=>{set("isCroise",v);set("races",[]);}} style={{flex:1,padding:"11px",borderRadius:14,cursor:"pointer",fontWeight:700,fontSize:13,border:"2px solid "+(d.isCroise===v?C.blue:C.blueM),background:d.isCroise===v?C.blueL:"white",color:d.isCroise===v?C.blue:C.textL,fontFamily:"Nunito,sans-serif"}}>{l}</button>)}
      </div>
      {d.races.length>0&&<div style={{marginBottom:10,display:"flex",gap:6,flexWrap:"wrap"}}>
        {d.races.map(r=><span key={r} onClick={()=>toggleRace(r)} style={{background:C.blue,color:"white",borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>× {r}</span>)}
      </div>}
      {d.isCroise&&<p style={{color:C.textL,fontSize:12,margin:"0 0 8px"}}>Jusqu'à 4 races ({d.races.length}/4)</p>}
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher une race…" style={{width:"100%",padding:"11px 14px",borderRadius:14,border:"2px solid "+C.blueM,fontSize:13,color:C.text,fontFamily:"Nunito,sans-serif",outline:"none",marginBottom:8}}/>
      <div style={{maxHeight:260,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
        {filtered.map(r=>{
          const sel=d.isCroise?d.races.includes(r):d.races[0]===r;
          return <button key={r} onClick={()=>d.isCroise?toggleRace(r):set("races",[r])} style={{padding:"10px 14px",borderRadius:12,cursor:"pointer",textAlign:"left",fontWeight:600,fontSize:13,border:"2px solid "+(sel?C.blue:C.blueM),background:sel?C.blueL:"white",color:sel?C.blue:C.text,fontFamily:"Nunito,sans-serif"}}>{sel?"✓ ":""}{r}</button>;
        })}
      </div>
      {d.isCroise&&<div style={{marginTop:10}}><Inp label="Ou décris librement" value={d.raceLibre} onChange={v=>set("raceLibre",v)} placeholder="Ex: Croisé Labrador Caniche"/></div>}
    </div>,

    <div className="fade">
      <h3 style={{color:C.text,fontFamily:"Georgia,serif",fontSize:20,margin:"0 0 16px"}}>Âge et poids 📏</h3>
      <p style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:C.text}}>Âge</p>
      <div style={{display:"flex",gap:10,marginBottom:16}}>

        <div style={{display:"flex",background:C.blueL,borderRadius:14,padding:4}}>
          {["mois","ans"].map(u=><button key={u} onClick={()=>set("ageUnit",u)} style={{padding:"8px 14px",borderRadius:11,border:"none",cursor:"pointer",background:d.ageUnit===u?"white":"transparent",color:d.ageUnit===u?C.blue:C.textL,fontWeight:700,fontSize:13,fontFamily:"Nunito,sans-serif"}}>{u}</button>)}
        </div>
      </div>
      <Inp label="Poids (kg)" type="number" value={d.weight} onChange={v=>set("weight",v)} placeholder="Ex: 14"/>
    </div>,

    <div className="fade">
      <h3 style={{color:C.text,fontFamily:"Georgia,serif",fontSize:20,margin:"0 0 6px"}}>Infos santé 📝</h3>
      <p style={{color:C.textL,fontSize:13,margin:"0 0 14px"}}>Allergies, maladies, caractère… (optionnel)</p>
      <Inp multiline value={d.notes} onChange={v=>set("notes",v)} placeholder="Ex: Allergie au poulet, très énergique, craintif avec les inconnus…" rows={4}/>
      <div style={{background:C.blueL,borderRadius:14,padding:"12px 16px",display:"flex",gap:10,alignItems:"center"}}>
        <span style={{fontSize:20}}>🔒</span>
        <p style={{margin:0,fontSize:12,color:C.blue,fontWeight:600}}>Données privées · Chiffrées · Jamais revendues</p>
      </div>
    </div>,
  ];

  return <div style={{minHeight:"100vh",background:C.blueL,padding:"24px 20px"}}>
    <div style={{display:"flex",gap:6,marginBottom:24}}>
      {steps.map((_,i)=><div key={i} style={{flex:1,height:5,borderRadius:99,background:i<=step?"linear-gradient(90deg,"+C.blue+","+C.purple+")":C.blueM,transition:"background 0.3s"}}/>)}
    </div>
    <Card style={{marginBottom:14}}>{steps[step]}</Card>
    <div style={{display:"flex",gap:10}}>
      {step>0&&<Btn onClick={()=>setStep(s=>s-1)} ghost style={{flex:1}}>← Retour</Btn>}
      {step<steps.length-1
        ?<Btn onClick={()=>setStep(s=>s+1)} disabled={!canNext[step]} style={{flex:2}}>Continuer →</Btn>
        :<Btn onClick={save} disabled={load} style={{flex:2}}>{load?"Sauvegarde…":"🐾 Créer le profil"}</Btn>}
    </div>
  </div>;
}

function getSigneFromDate(dateStr){
  if(!dateStr)return null;
  const d=new Date(dateStr);
  const m=d.getMonth()+1,j=d.getDate();
  if((m===3&&j>=21)||(m===4&&j<=19))return SIGNES[0];
  if((m===4&&j>=20)||(m===5&&j<=20))return SIGNES[1];
  if((m===5&&j>=21)||(m===6&&j<=20))return SIGNES[2];
  if((m===6&&j>=21)||(m===7&&j<=22))return SIGNES[3];
  if((m===7&&j>=23)||(m===8&&j<=22))return SIGNES[4];
  if((m===8&&j>=23)||(m===9&&j<=22))return SIGNES[5];
  if((m===9&&j>=23)||(m===10&&j<=22))return SIGNES[6];
  if((m===10&&j>=23)||(m===11&&j<=21))return SIGNES[7];
  if((m===11&&j>=22)||(m===12&&j<=21))return SIGNES[8];
  if((m===12&&j>=22)||(m===1&&j<=19))return SIGNES[9];
  if((m===1&&j>=20)||(m===2&&j<=18))return SIGNES[10];
  return SIGNES[11];
}

// ── CARNET SANTÉ ──────────────────────────────────────────
function PageCarnetSante({dog}){
  const KEY="zoomly_sante_"+dog.name;
  const [entries,setEntries]=useState(()=>JSON.parse(localStorage.getItem(KEY)||"[]"));
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({type:"vaccin",nom:"",date:"",rappel:"",notes:""});
  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));

  const save=()=>{
    if(!form.nom||!form.date)return;
    const e={...form,id:Date.now()};
    const next=[e,...entries];
    setEntries(next);localStorage.setItem(KEY,JSON.stringify(next));
    setForm({type:"vaccin",nom:"",date:"",rappel:"",notes:""});setShow(false);
  };

  const del=id=>{const next=entries.filter(e=>e.id!==id);setEntries(next);localStorage.setItem(KEY,JSON.stringify(next));};

  const types=[
    {v:"vaccin",l:"💉 Vaccin",c:C.blue},
    {v:"vermifuge",l:"🐛 Vermifuge",c:C.green},
    {v:"parasitaire",l:"🦟 Antiparasitaire",c:C.orange},
    {v:"medicament",l:"💊 Médicament",c:C.purple},
    {v:"rdv",l:"🏥 RDV véto",c:C.red},
    {v:"autre",l:"📋 Autre",c:C.textL},
  ];

  const getColor=t=>types.find(x=>x.v===t)?.c||C.textL;
  const getLabel=t=>types.find(x=>x.v===t)?.l||t;

  // Rappels à venir (dans les 30 prochains jours)
  const today=new Date();
  const rappels=entries.filter(e=>{
    if(!e.rappel)return false;
    const d=new Date(e.rappel);
    const diff=(d-today)/(1000*60*60*24);
    return diff>=0&&diff<=30;
  }).sort((a,b)=>new Date(a.rappel)-new Date(b.rappel));

  return <div style={{padding:"24px 16px"}} className="fade">
    <h2 style={{color:C.text,fontFamily:"Georgia,serif",margin:"0 0 4px",fontSize:22}}>Carnet de santé 📅</h2>
    <p style={{color:C.textL,fontSize:13,margin:"0 0 16px"}}>Suivi médical de {dog.name}</p>

    {rappels.length>0&&<Card style={{background:"linear-gradient(135deg,"+C.orangeL+","+C.goldL+")"}}>
      <h4 style={{color:C.orange,margin:"0 0 10px",fontSize:14}}>⏰ Rappels à venir</h4>
      {rappels.map(r=>{
        const j=Math.round((new Date(r.rappel)-today)/(1000*60*60*24));
        return <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <p style={{margin:0,fontSize:13,color:C.text,fontWeight:600}}>{getLabel(r.type)} — {r.nom}</p>
          <Tag color={j<=7?"orange":"gold"}>{j===0?"Aujourd'hui":j===1?"Demain":"Dans "+j+"j"}</Tag>
        </div>;
      })}
    </Card>}

    {!show?<Btn onClick={()=>setShow(true)} style={{marginBottom:16}}>+ Ajouter un soin</Btn>
    :<Card>
      <h4 style={{color:C.text,margin:"0 0 14px"}}>Nouveau soin</h4>
      <p style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:C.text}}>Type</p>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
        {types.map(t=><button key={t.v} onClick={()=>setF("type",t.v)} style={{padding:"8px 14px",borderRadius:20,border:"2px solid "+(form.type===t.v?t.c:C.blueM),background:form.type===t.v?"white":"transparent",color:form.type===t.v?t.c:C.textL,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"Nunito,sans-serif"}}>{t.l}</button>)}
      </div>
      <Inp label="Nom du soin" value={form.nom} onChange={v=>setF("nom",v)} placeholder="Ex: Vaccin rage, Frontline…"/>
      <Inp label="Date du soin" type="date" value={form.date} onChange={v=>setF("date",v)}/>
      <Inp label="Date de rappel (optionnel)" type="date" value={form.rappel} onChange={v=>setF("rappel",v)}/>
      <Inp label="Notes" value={form.notes} onChange={v=>setF("notes",v)} placeholder="Remarques…"/>
      <div style={{display:"flex",gap:10}}>
        <Btn onClick={save} disabled={!form.nom||!form.date} style={{flex:2}}>💾 Sauvegarder</Btn>
        <Btn onClick={()=>setShow(false)} ghost style={{flex:1}}>Annuler</Btn>
      </div>
    </Card>}

    {entries.length===0&&!show&&<div style={{textAlign:"center",padding:"40px 0",color:C.textL}}>
      <span style={{fontSize:48,display:"block",marginBottom:12}}>💉</span>
      <p style={{fontSize:14}}>Aucun soin enregistré</p>
      <p style={{fontSize:13}}>Commence par ajouter un vaccin ou un vermifuge !</p>
    </div>}

    {entries.map(e=><Card key={e.id}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
            <Tag color={e.type==="vaccin"?"blue":e.type==="vermifuge"?"green":e.type==="parasitaire"?"orange":e.type==="rdv"?"red":"purple"}>{getLabel(e.type)}</Tag>
            <p style={{margin:0,fontWeight:700,color:C.text,fontSize:14}}>{e.nom}</p>
          </div>
          <p style={{margin:"0 0 4px",fontSize:12,color:C.textL}}>📅 {new Date(e.date).toLocaleDateString("fr-FR")}</p>
          {e.rappel&&<p style={{margin:"0 0 4px",fontSize:12,color:C.orange}}>⏰ Rappel: {new Date(e.rappel).toLocaleDateString("fr-FR")}</p>}
          {e.notes&&<p style={{margin:0,fontSize:12,color:C.textL,fontStyle:"italic"}}>{e.notes}</p>}
        </div>
        <button onClick={()=>del(e.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.textL,fontSize:18,padding:"0 0 0 8px"}}>×</button>
      </div>
    </Card>)}
  </div>;
}

function PageEducation({dog}){
  const KEY="zoomly_edu_"+dog.name;
  const [progress,setProgress]=useState(()=>JSON.parse(localStorage.getItem(KEY)||"{}"));
  const [sel,setSel]=useState(null);
  const [timer,setTimer]=useState(0);
  const [running,setRunning]=useState(false);
  const timerRef=useRef(null);

  const startTimer=dur=>{
    setTimer(dur*60);setRunning(true);
    timerRef.current=setInterval(()=>{
      setTimer(t=>{if(t<=1){clearInterval(timerRef.current);setRunning(false);return 0;}return t-1;});
    },1000);
  };

  const stopTimer=()=>{clearInterval(timerRef.current);setRunning(false);setTimer(0);};

  const markDone=id=>{
    const next={...progress,[id]:(progress[id]||0)+1};
    setProgress(next);localStorage.setItem(KEY,JSON.stringify(next));
  };

  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  const niveauColor=n=>n==="Débutant"?C.green:n==="Intermédiaire"?C.gold:C.orange;

  if(sel) return <div style={{padding:"24px 16px"}} className="fade">
    <button onClick={()=>{setSel(null);stopTimer();}} style={{background:"none",border:"none",cursor:"pointer",color:C.blue,fontWeight:700,fontSize:14,marginBottom:16,padding:0}}>← Retour</button>
    <div style={{textAlign:"center",marginBottom:20}}>
      <span style={{fontSize:52}}>{sel.emoji}</span>
      <h2 style={{color:C.text,fontFamily:"Georgia,serif",margin:"10px 0 8px"}}>{sel.nom}</h2>
      <div style={{display:"flex",gap:8,justifyContent:"center"}}>
        <Tag color={sel.niveau==="Débutant"?"green":sel.niveau==="Intermédiaire"?"gold":"orange"}>{sel.niveau}</Tag>
        <Tag>⏱ {sel.duree} min</Tag>
        {(progress[sel.id]||0)>0&&<Tag color="purple">✓ {progress[sel.id]} fois réussi</Tag>}
      </div>
    </div>

    <Card><p style={{color:C.textL,fontSize:14,lineHeight:1.6,margin:0}}>{sel.desc}</p></Card>

    <Card>
      <h4 style={{color:C.text,margin:"0 0 12px"}}>📋 Étapes</h4>
      {sel.etapes.map((e,i)=><div key={i} style={{display:"flex",gap:12,marginBottom:10}}>
        <div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,"+C.blue+","+C.purple+")",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12,fontWeight:800,color:"white"}}>{i+1}</div>
        <p style={{margin:0,fontSize:13,color:C.text,lineHeight:1.5}}>{e}</p>
      </div>)}

    {/* Timer */}
    <Card style={{textAlign:"center"}}>
      <h4 style={{color:C.text,margin:"0 0 16px"}}>⏱ Minuteur de séance</h4>
      {timer>0?<div>
        <p style={{fontSize:48,fontWeight:900,color:C.blue,margin:"0 0 16px",fontFamily:"Georgia,serif"}}>{fmt(timer)}</p>
        <Btn onClick={stopTimer} color="red">⏹ Arrêter</Btn>
      </div>:<Btn onClick={()=>startTimer(sel.duree)}>▶ Lancer {sel.duree} min de séance</Btn>}
    </Card>

    <Btn onClick={()=>markDone(sel.id)} color="green">✓ Séance réussie ! (+1)</Btn>
  </div>;

  return <div style={{padding:"24px 16px"}} className="fade">
    <h2 style={{color:C.text,fontFamily:"Georgia,serif",margin:"0 0 4px",fontSize:22}}>Éducation 🎓</h2>

      <span style={{fontSize:18}}>💡</span>
      <p style={{margin:0,fontSize:12,color:C.blue,fontWeight:600}}>Sessions courtes et positives = meilleurs résultats ! Jamais plus de 15 min.</p>

          <Tag color={ex.niveau==="Débutant"?"green":ex.niveau==="Intermédiaire"?"gold":"orange"}>{ex.niveau}</Tag>

// ── SUIVI BALADES ─────────────────────────────────────────
function PageBalades({dog}){
  const KEY="zoomly_balades_"+dog.name;
  const [balades,setBalades]=useState(()=>JSON.parse(localStorage.getItem(KEY)||"[]"));
  const [running,setRunning]=useState(false);
  const [elapsed,setElapsed]=useState(0);
  const [dist,setDist]=useState("");
  const [show,setShow]=useState(false);
  const timerRef=useRef(null);
  const startRef=useRef(null);

  const start=()=>{
    startRef.current=Date.now()-elapsed*1000;
    setRunning(true);
    timerRef.current=setInterval(()=>setElapsed(Math.floor((Date.now()-startRef.current)/1000)),1000);
  };

  const pause=()=>{clearInterval(timerRef.current);setRunning(false);};
  const reset=()=>{clearInterval(timerRef.current);setRunning(false);setElapsed(0);setDist("");};

  const saveBalade=()=>{
    const km=parseFloat(dist)||0;
    const poids=parseFloat(dog.weight)||10;
    const calories=Math.round(km*poids*0.8+elapsed/60*poids*0.05);
    const b={id:Date.now(),date:new Date().toLocaleDateString("fr-FR"),duree:elapsed,distance:km,calories,};
    const next=[b,...balades];
    setBalades(next);localStorage.setItem(KEY,JSON.stringify(next));
    reset();setShow(false);
  };

  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

  // Stats
  const totalKm=balades.reduce((a,b)=>a+(b.distance||0),0);
  const totalMin=balades.reduce((a,b)=>a+Math.floor(b.duree/60),0);
  const totalCal=balades.reduce((a,b)=>a+(b.calories||0),0);

  return <div style={{padding:"24px 16px"}} className="fade">
    <h2 style={{color:C.text,fontFamily:"Georgia,serif",margin:"0 0 4px",fontSize:22}}>Balades 🚶</h2>
    <p style={{color:C.textL,fontSize:13,margin:"0 0 16px"}}>Suivi des sorties de {dog.name}</p>

    {/* Stats globales */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
      {[["🏃",totalKm.toFixed(1)+" km","Distance"],["⏱",totalMin+" min","Durée totale"],["🔥",totalCal+" kcal","Calories"]].map(([e,v,l])=><Card key={l} style={{textAlign:"center",marginBottom:0,padding:"12px 8px"}}>
        <span style={{fontSize:20,display:"block"}}>{e}</span>
        <p style={{margin:"4px 0 0",fontWeight:800,color:C.text,fontSize:14}}>{v}</p>
        <p style={{margin:0,fontSize:10,color:C.textL}}>{l}</p>
      </Card>)}
    </div>

    {/* Timer balade */}
    <Card style={{textAlign:"center"}}>
      <h4 style={{color:C.text,margin:"0 0 16px"}}>Balade en cours</h4>
      <p style={{fontSize:52,fontWeight:900,color:C.blue,margin:"0 0 8px",fontFamily:"Georgia,serif"}}>{fmt(elapsed)}</p>
      <div style={{display:"flex",gap:10,marginBottom:dist!==undefined?14:0}}>
        {!running?<Btn onClick={start} color="green" style={{flex:1}}>▶ {elapsed>0?"Reprendre":"Démarrer"}</Btn>
        :<Btn onClick={pause} color="orange" style={{flex:1}}>⏸ Pause</Btn>}
        {elapsed>0&&<Btn onClick={reset} ghost style={{flex:1}}>↺ Reset</Btn>}
      </div>
      {elapsed>0&&!running&&<div>
        <Inp label="Distance parcourue (km)" type="number" value={dist} onChange={setDist} placeholder="Ex: 2.5"/>
        <Btn onClick={saveBalade} color="green">💾 Sauvegarder cette balade</Btn>
      </div>}
    </Card>

    {balades.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:C.textL}}>
      <span style={{fontSize:48,display:"block",marginBottom:12}}>🐾</span>
      <p style={{fontSize:14}}>Aucune balade enregistrée</p>
    </div>}

    {balades.map(b=><Card key={b.id}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <p style={{margin:"0 0 4px",fontWeight:700,color:C.text,fontSize:14}}>📅 {b.date}</p>
          <div style={{display:"flex",gap:8}}>
            <Tag>⏱ {fmt(b.duree)}</Tag>
            {b.distance>0&&<Tag color="green">🏃 {b.distance} km</Tag>}
            {b.calories>0&&<Tag color="orange">🔥 {b.calories} kcal</Tag>}
          </div>
        </div>
      </div>
    </Card>)}
  </div>;
}

function PageRappels({dog}){
  const KEY="zoomly_rappels_"+dog.name;
  const [rappels,setRappels]=useState(()=>JSON.parse(localStorage.getItem(KEY)||"[]"));
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({type:"repas",nom:"",heure:"08:00",jours:["lun","mar","mer","jeu","ven","sam","dim"],actif:true});
  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));

  const jList=["lun","mar","mer","jeu","ven","sam","dim"];
  const togJ=j=>setF("jours",form.jours.includes(j)?form.jours.filter(x=>x!==j):[...form.jours,j]);

  const save=()=>{
    if(!form.nom)return;
    const r={...form,id:Date.now()};
    const next=[r,...rappels];
    setRappels(next);localStorage.setItem(KEY,JSON.stringify(next));
    setForm({type:"repas",nom:"",heure:"08:00",jours:["lun","mar","mer","jeu","ven","sam","dim"],actif:true});
    setShow(false);
  };

  const del=id=>{const next=rappels.filter(r=>r.id!==id);setRappels(next);localStorage.setItem(KEY,JSON.stringify(next));};
  const tog=id=>{const next=rappels.map(r=>r.id===id?{...r,actif:!r.actif}:r);setRappels(next);localStorage.setItem(KEY,JSON.stringify(next));};

  const types=[{v:"repas",l:"🍽️ Repas"},{v:"balade",l:"🚶 Balade"},{v:"medicament",l:"💊 Médicament"},{v:"rdv",l:"🏥 RDV véto"},{v:"autre",l:"🔔 Autre"}];
  const typeColor=t=>t==="repas"?C.gold:t==="balade"?C.green:t==="medicament"?C.purple:t==="rdv"?C.red:C.blue;

  return <div style={{padding:"24px 16px"}} className="fade">
    <h2 style={{color:C.text,fontFamily:"Georgia,serif",margin:"0 0 4px",fontSize:22}}>Rappels 🔔</h2>
    <p style={{color:C.textL,fontSize:13,margin:"0 0 16px"}}>Alertes pour le quotidien de {dog.name}</p>

    {!show?<Btn onClick={()=>setShow(true)} style={{marginBottom:16}}>+ Ajouter un rappel</Btn>
    :<Card>
      <h4 style={{color:C.text,margin:"0 0 14px"}}>Nouveau rappel</h4>
      <p style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:C.text}}>Type</p>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
        {types.map(t=><button key={t.v} onClick={()=>setF("type",t.v)} style={{padding:"8px 14px",borderRadius:20,border:"2px solid "+(form.type===t.v?typeColor(t.v):C.blueM),background:form.type===t.v?C.blueL:"white",color:form.type===t.v?typeColor(t.v):C.textL,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"Nunito,sans-serif"}}>{t.l}</button>)}
      </div>
      <Inp label="Nom du rappel" value={form.nom} onChange={v=>setF("nom",v)} placeholder="Ex: Repas du matin, Médicament…"/>
      <Inp label="Heure" type="time" value={form.heure} onChange={v=>setF("heure",v)}/>
      <p style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:C.text}}>Jours</p>
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {jList.map(j=><button key={j} onClick={()=>togJ(j)} style={{flex:1,padding:"8px 4px",borderRadius:10,border:"2px solid "+(form.jours.includes(j)?C.blue:C.blueM),background:form.jours.includes(j)?C.blueL:"white",color:form.jours.includes(j)?C.blue:C.textL,fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"Nunito,sans-serif"}}>{j}</button>)}
      </div>
      <div style={{display:"flex",gap:10}}>
        <Btn onClick={save} disabled={!form.nom} style={{flex:2}}>💾 Créer</Btn>
        <Btn onClick={()=>setShow(false)} ghost style={{flex:1}}>Annuler</Btn>
      </div>
    </Card>}

    {rappels.length===0&&!show&&<div style={{textAlign:"center",padding:"40px 0",color:C.textL}}>
      <span style={{fontSize:48,display:"block",marginBottom:12}}>🔔</span>
      <p style={{fontSize:14}}>Aucun rappel configuré</p>
    </div>}

    {rappels.map(r=><Card key={r.id} style={{opacity:r.actif?1:0.6}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
            <span style={{fontSize:18}}>{types.find(t=>t.v===r.type)?.l.split(" ")[0]||"🔔"}</span>
            <p style={{margin:0,fontWeight:700,color:C.text,fontSize:14}}>{r.nom}</p>
          </div>
          <p style={{margin:"0 0 4px",fontSize:12,color:C.blue,fontWeight:600}}>⏰ {r.heure}</p>
          <p style={{margin:0,fontSize:11,color:C.textL}}>{r.jours.join(", ")}</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>tog(r.id)} style={{background:r.actif?C.green:C.blueM,border:"none",borderRadius:20,padding:"6px 12px",color:"white",fontSize:12,fontWeight:700,cursor:"pointer"}}>{r.actif?"ON":"OFF"}</button>
          <button onClick={()=>del(r.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.textL,fontSize:18}}>×</button>
        </div>
      </div>
    </Card>)}
  </div>;
}

// ── ALBUM PHOTO ───────────────────────────────────────────
function PageAlbum({dog}){
  const KEY="zoomly_album_"+dog.name;
  const [photos,setPhotos]=useState(()=>JSON.parse(localStorage.getItem(KEY)||"[]"));
  const [sel,setSel]=useState(null);
  const fileRef=useRef(null);

  const addPhoto=e=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const p={id:Date.now(),src:ev.target.result,date:new Date().toLocaleDateString("fr-FR"),caption:""};
      const next=[p,...photos];
      setPhotos(next);localStorage.setItem(KEY,JSON.stringify(next));
    };
    reader.readAsDataURL(file);
  };

  const del=id=>{
    const next=photos.filter(p=>p.id!==id);
    setPhotos(next);localStorage.setItem(KEY,JSON.stringify(next));
    setSel(null);
  };

  if(sel) return <div style={{minHeight:"100vh",background:"#000",display:"flex",flexDirection:"column"}}>
    <div style={{padding:"16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <button onClick={()=>setSel(null)} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:20,padding:"8px 16px",color:"white",fontWeight:700,cursor:"pointer"}}>← Retour</button>
      <button onClick={()=>del(sel.id)} style={{background:"rgba(255,0,0,0.5)",border:"none",borderRadius:20,padding:"8px 16px",color:"white",fontWeight:700,cursor:"pointer"}}>🗑️ Supprimer</button>
    </div>
    <img src={sel.src} style={{width:"100%",flex:1,objectFit:"contain"}}/>
    <p style={{color:"rgba(255,255,255,0.7)",textAlign:"center",padding:"16px",fontSize:13}}>{sel.date}</p>
  </div>;

  return <div style={{padding:"24px 16px"}} className="fade">
    <input ref={fileRef} type="file" accept="image/*" onChange={addPhoto} style={{display:"none"}}/>
    <h2 style={{color:C.text,fontFamily:"Georgia,serif",margin:"0 0 4px",fontSize:22}}>Album photo 📸</h2>
    <p style={{color:C.textL,fontSize:13,margin:"0 0 16px"}}>Les plus beaux souvenirs de {dog.name}</p>

    <Btn onClick={()=>fileRef.current.click()} style={{marginBottom:16}}>📸 Ajouter une photo</Btn>

    {photos.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.textL}}>
      <span style={{fontSize:48,display:"block",marginBottom:12}}>📷</span>
      <p style={{fontSize:14}}>Aucune photo pour l'instant</p>
    </div>}

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
      {photos.map(p=><div key={p.id} onClick={()=>setSel(p)} style={{aspectRatio:"1",borderRadius:12,overflow:"hidden",cursor:"pointer"}}>
        <img src={p.src} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
      </div>)}
    </div>
  </div>;
}

function PageJournal({dog}){
  const KEY="zoomly_journal_"+dog.name;
  const [entries,setEntries]=useState(()=>JSON.parse(localStorage.getItem(KEY)||"[]"));
  const [note,setNote]=useState("");
  const [mood,setMood]=useState("😊");
  const [show,setShow]=useState(false);

  const save=()=>{
    if(!note.trim())return;
    const e={id:Date.now(),date:new Date().toLocaleDateString("fr-FR"),note,mood};
    const next=[e,...entries];
    setEntries(next);localStorage.setItem(KEY,JSON.stringify(next));
    setNote("");setShow(false);
  };

  const del=id=>{const next=entries.filter(e=>e.id!==id);setEntries(next);localStorage.setItem(KEY,JSON.stringify(next));};

  return <div style={{padding:"24px 16px"}} className="fade">
    <h2 style={{color:C.text,fontFamily:"Georgia,serif",margin:"0 0 4px",fontSize:22}}>Journal 📖</h2>
    <p style={{color:C.textL,fontSize:13,margin:"0 0 16px"}}>L'histoire de {dog.name}</p>
    {show?<Card>
      <p style={{margin:"0 0 12px",fontWeight:700,color:C.text}}>Nouvelle note</p>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        {["😊","⚡","🌟","😴","🏆","❤️","😰","🍗","🎯","🐾"].map(e=><span key={e} onClick={()=>setMood(e)} style={{fontSize:22,cursor:"pointer",opacity:mood===e?1:0.35,transition:"opacity 0.2s"}}>{e}</span>)}
      </div>
      <Inp multiline value={note} onChange={setNote} placeholder="Qu'est-ce qui s'est passé aujourd'hui ?" rows={4}/>
      <div style={{display:"flex",gap:10}}><Btn onClick={save} disabled={!note.trim()}>💾 Sauvegarder</Btn><Btn onClick={()=>setShow(false)} ghost>Annuler</Btn></div>
    </Card>:<Btn onClick={()=>setShow(true)} style={{marginBottom:16}}>+ Ajouter une note</Btn>}
    {entries.length===0&&!show&&<div style={{textAlign:"center",padding:"40px 0",color:C.textL}}><span style={{fontSize:48,display:"block",marginBottom:12}}>📝</span><p>Aucune note pour l'instant</p></div>}
    {entries.map((e,i)=><div key={e.id} style={{display:"flex",gap:12,marginBottom:16}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:40,height:40,borderRadius:"50%",background:C.blueL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{e.mood}</div>
        {i<entries.length-1&&<div style={{width:2,flex:1,background:C.blueL,margin:"6px 0"}}/>}
      </div>
      <Card style={{flex:1,marginBottom:0}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
          <p style={{margin:0,fontSize:11,color:C.textL,fontWeight:600}}>{e.date}</p>
          <button onClick={()=>del(e.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.textL,fontSize:14,padding:0}}>✕</button>
        </div>
        <p style={{margin:0,color:C.text,fontSize:14,lineHeight:1.5}}>{e.note}</p>
      </Card>
    </div>)}
  </div>;
}

    const sys="Tu es Zoomly, coach canin IA bienveillant et expert. Réponds en français avec quelques emojis. Chien: "+dog.name+", "+dog.raceLabel+", "+dog.age+" "+dog.ageUnit+", "+dog.weight+"kg, "+(dog.sex==="female"?"femelle":"mâle")+". Notes: "+(dog.notes||"aucune")+". Adapte TOUJOURS tes conseils à la race spécifique. Réponses courtes et pratiques. Historique:\n"+history;
    const rep=await callGemini(sys,msg);
    setMsgs(p=>[...p,{r:"a",t:rep||"Oops, connexion impossible. Réessaie ! 🐾"}]);
    setLoad(false);
  };

  return <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 130px)"}}>
    <div style={{padding:"24px 16px 10px"}}>
      <h2 style={{color:C.text,fontFamily:"Georgia,serif",margin:"0 0 4px",fontSize:22}}>Coach 🤖</h2>
      <div style={{background:C.goldL,borderRadius:10,padding:"6px 12px",display:"inline-block"}}>
        <p style={{margin:0,fontSize:11,color:C.green,fontWeight:700}}>✅ Gemini IA activé !</p>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"0 16px"}}>
      {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.r==="u"?"flex-end":"flex-start",marginBottom:12,alignItems:"flex-end",gap:8}}>
        {m.r==="a"&&<div style={{background:"white",borderRadius:"50%",padding:4,boxShadow:"0 2px 8px rgba(74,127,224,0.2)",flexShrink:0}}><Mascot size={28}/></div>}
        <div style={{maxWidth:"78%",background:m.r==="u"?"linear-gradient(135deg,"+C.blue+","+C.purple+")":"white",color:m.r==="u"?"white":C.text,borderRadius:m.r==="u"?"20px 20px 4px 20px":"20px 20px 20px 4px",padding:"12px 16px",fontSize:13,lineHeight:1.6,boxShadow:"0 2px 12px rgba(74,127,224,0.15)",whiteSpace:"pre-line"}}>{m.t}</div>
      </div>)}
      {load&&<div style={{display:"flex",gap:8,alignItems:"flex-end",marginBottom:12}}>
        <div style={{background:"white",borderRadius:"50%",padding:4,flexShrink:0}}><Mascot size={28}/></div>
        <div style={{background:"white",borderRadius:"20px 20px 20px 4px",padding:"14px 18px"}}><span style={{display:"inline-flex",gap:4}}>{[0,1,2].map(i=><span key={i} style={{width:8,height:8,borderRadius:"50%",background:C.blue,display:"inline-block",animation:"bounce 1s ease "+i*0.2+"s infinite"}}/>)}</span></div>
      </div>}
      <div ref={bot}/>
    </div>
    <div style={{padding:"6px 16px",display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
      {["Durée de balade ?","Quand vacciner ?","Comment dresser ?","Il aboie beaucoup","Alimentation équilibrée ?"].map(s=><button key={s} onClick={()=>setInp(s)} style={{whiteSpace:"nowrap",background:"white",border:"2px solid "+C.blueM,borderRadius:20,padding:"7px 14px",color:C.blue,fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0}}>{s}</button>)}
    </div>
    <div style={{padding:"8px 16px 24px",display:"flex",gap:10}}>
      <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Pose ta question…" style={{flex:1,padding:"13px 18px",borderRadius:99,border:"2px solid "+C.blueM,fontSize:14,outline:"none",color:C.text,fontFamily:"Nunito,sans-serif",background:"white"}}/>
      <button onClick={send} disabled={load} style={{width:48,height:48,borderRadius:"50%",background:"linear-gradient(135deg,"+C.blue+","+C.purple+")",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:load?0.6:1}}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>;
}

const CARACTERES_OPTIONS=["Joueur","Calme","Énergique","Affectueux","Indépendant","Timide","Courageux","Têtu","Obéissant","Sociable","Protecteur","Anxieux","Curieux","Gourmand","Dominant","Doux","Hyperactif","Paresseux"];

function PageProfil({dog,user,onLogout,onDogUpdate}){
  const signe=getSigneFromDate(dog.birthday);
  const [edit,setEdit]=useState(false);
  const [showFiche,setShowFiche]=useState(false);
  const [form,setForm]=useState({...dog});
  const [load,setLoad]=useState(false);
  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));

  const togCaractere=c=>{
    const list=form.caracteres||[];
    setF("caracteres",list.includes(c)?list.filter(x=>x!==c):[...list,c]);
  };

  const save=async()=>{
    setLoad(true);
    const updated={...form};
    await window._fb.updateDoc("users",user.uid,{dog:updated});
    onDogUpdate(updated);
    setEdit(false);setLoad(false);
  };

  if(showFiche) return <FicheRace race={dog.raceLabel} onClose={()=>setShowFiche(false)}/>;

  if(edit) return <div style={{padding:"24px 16px"}} className="fade">
    <button onClick={()=>setEdit(false)} style={{background:"none",border:"none",cursor:"pointer",color:C.blue,fontWeight:700,fontSize:14,marginBottom:16,padding:0}}>← Annuler</button>
    <h2 style={{color:C.text,fontFamily:"Georgia,serif",margin:"0 0 16px"}}>Modifier le profil ✏️</h2>
    <Card>
      <Inp label="Prénom" value={form.name||""} onChange={v=>setF("name",v)} placeholder="Prénom"/>
      <Inp label="Date de naissance" type="date" value={form.birthday||""} onChange={v=>setF("birthday",v)}/>
      <Inp label="Âge" type="number" value={form.age||""} onChange={v=>setF("age",v)} placeholder="Ex: 2"/>
      <p style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:C.text}}>Unité d'âge</p>
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        {["mois","ans"].map(u=><button key={u} onClick={()=>setF("ageUnit",u)} style={{flex:1,padding:"10px",borderRadius:14,border:"2px solid "+(form.ageUnit===u?C.blue:C.blueM),background:form.ageUnit===u?C.blueL:"white",color:form.ageUnit===u?C.blue:C.textL,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"Nunito,sans-serif"}}>{u}</button>)}
      </div>
      <Inp label="Poids (kg)" type="number" value={form.weight||""} onChange={v=>setF("weight",v)} placeholder="Ex: 14"/>
      <p style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:C.text}}>Sexe</p>
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        {[["female","♀ Femelle"],["male","♂ Mâle"]].map(([v,l])=><button key={v} onClick={()=>setF("sex",v)} style={{flex:1,padding:"11px",borderRadius:14,cursor:"pointer",fontWeight:700,border:"2px solid "+(form.sex===v?C.blue:C.blueM),background:form.sex===v?C.blueL:"white",color:form.sex===v?C.blue:C.textL,fontFamily:"Nunito,sans-serif"}}>{l}</button>)}
      </div>
      <p style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:C.text}}>Stérilisé·e ?</p>
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        {[["yes","✓ Oui"],["no","✗ Non"]].map(([v,l])=><button key={v} onClick={()=>setF("sterilized",v)} style={{flex:1,padding:"10px",borderRadius:14,cursor:"pointer",fontWeight:700,border:"2px solid "+(form.sterilized===v?C.blue:C.blueM),background:form.sterilized===v?C.blueL:"white",color:form.sterilized===v?C.blue:C.textL,fontFamily:"Nunito,sans-serif"}}>{l}</button>)}
      </div>
      <p style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:C.text}}>Caractère de {form.name} (plusieurs choix)</p>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
        {CARACTERES_OPTIONS.map(c=>{
          const sel=(form.caracteres||[]).includes(c);
          return <button key={c} onClick={()=>togCaractere(c)} style={{padding:"7px 14px",borderRadius:20,border:"2px solid "+(sel?C.blue:C.blueM),background:sel?C.blueL:"white",color:sel?C.blue:C.textL,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"Nunito,sans-serif"}}>{sel?"✓ ":""}{c}</button>;
        })}
      </div>
      <Inp label="Notes de santé" multiline value={form.notes||""} onChange={v=>setF("notes",v)} placeholder="Allergies, maladies…"/>
      <Btn onClick={save} disabled={load}>{load?"Sauvegarde…":"💾 Sauvegarder"}</Btn>
    </Card>
  </div>;

  return <div style={{padding:"24px 16px"}} className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <h2 style={{color:C.text,fontFamily:"Georgia,serif",margin:0,fontSize:22}}>Profil 🐾</h2>
      <button onClick={()=>setEdit(true)} style={{background:C.blueL,border:"none",borderRadius:20,padding:"8px 16px",color:C.blue,fontWeight:700,fontSize:13,cursor:"pointer"}}>✏️ Modifier</button>
    </div>

    <div style={{textAlign:"center",marginBottom:20}}>
      <div style={{width:110,height:110,borderRadius:"50%",background:"linear-gradient(135deg,"+C.blue+","+C.purple+")",margin:"0 auto 14px",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",boxShadow:"0 8px 24px rgba(74,127,224,0.3)"}}><Mascot size={90}/></div>
      <h3 style={{color:C.text,fontFamily:"Georgia,serif",margin:"0 0 4px",fontSize:26}}>{dog.name}</h3>
      <p style={{color:C.textL,fontSize:13,margin:"0 0 10px"}}>{dog.raceLabel}</p>
      <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
        <Tag>{dog.age} {dog.ageUnit}</Tag>
        <Tag color="gold">{dog.weight} kg</Tag>
        <Tag color="purple">{dog.sex==="female"?"Femelle":"Mâle"}</Tag>
        <Tag color={dog.sterilized==="yes"?"green":"orange"}>{dog.sterilized==="yes"?"Stérilisé·e":"Non stérilisé·e"}</Tag>
        {signe&&<Tag color="pink">{signe.emoji} {signe.nom}</Tag>}
      </div>
    </div>

    {/* Caractère */}
    {dog.caracteres&&dog.caracteres.length>0&&<Card>
      <h4 style={{color:C.text,margin:"0 0 10px"}}>🎭 Caractère de {dog.name}</h4>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {dog.caracteres.map(c=><Tag key={c} color="purple">{c}</Tag>)}
      </div>
    </Card>}

    {/* Fiche race */}
    <Card onClick={()=>setShowFiche(true)} style={{cursor:"pointer",background:"linear-gradient(135deg,"+C.blueL+","+C.purpleL+")"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <h4 style={{color:C.text,margin:"0 0 4px"}}>🏷️ Fiche race complète</h4>
          <p style={{margin:0,fontSize:12,color:C.textL}}>{dog.raceLabel} — caractère, santé, alimentation…</p>
        </div>
        <span style={{color:C.blue,fontSize:22}}>›</span>
      </div>
    </Card>

    <Card style={{padding:0,overflow:"hidden"}}>
      {[["📧 Email",user.email],["🎂 Née le",dog.birthday?new Date(dog.birthday).toLocaleDateString("fr-FR"):"Non renseignée"],["🎂 Âge",dog.age+" "+dog.ageUnit],["⚖️ Poids",dog.weight+" kg"]].map(([k,v],i,a)=><div key={k} style={{padding:"14px 18px",display:"flex",justifyContent:"space-between",borderBottom:i<a.length-1?"1px solid "+C.blueL:"none"}}>
        <span style={{color:C.textL,fontSize:13}}>{k}</span>
        <span style={{color:C.text,fontWeight:700,fontSize:13,maxWidth:"55%",textAlign:"right",wordBreak:"break-all"}}>{v}</span>
      </div>)}
    </Card>

    {dog.notes&&<Card><p style={{margin:"0 0 8px",fontWeight:700,color:C.text}}>📝 Notes de santé</p><p style={{margin:0,color:C.textL,fontSize:13,lineHeight:1.6}}>{dog.notes}</p></Card>}
    <button onClick={onLogout} style={{width:"100%",padding:"14px",borderRadius:16,border:"2px solid "+C.blueM,background:"transparent",color:C.textL,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"Nunito,sans-serif",marginTop:8}}>Se déconnecter</button>
  </div>;
}

// ── NAV ───────────────────────────────────────────────────
const NAVS=[
  {id:"home",l:"Accueil",e:"🏠"},
  {id:"scanner",l:"Scanner",e:"🔍"},
  {id:"sante",l:"Santé",e:"🏥"},
  {id:"recettes",l:"Recettes",e:"🍳"},
  {id:"education",l:"Éducation",e:"🎓"},
  {id:"balades",l:"Balades",e:"🚶"},
  {id:"carnet",l:"Carnet",e:"📅"},
  {id:"rappels",l:"Rappels",e:"🔔"},
  {id:"astro",l:"Astro",e:"🌙"},
  {id:"album",l:"Photos",e:"📸"},
  {id:"carte",l:"ID",e:"🆔"},
  {id:"journal",l:"Journal",e:"📖"},
  {id:"chat",l:"Coach",e:"🤖"},
  {id:"profil",l:"Profil",e:"👤"},
];

// ── APP ───────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [dog,setDog]=useState(null);
  const [ready,setReady]=useState(false);
  const [page,setPage]=useState("home");
  const [onboard,setOnboard]=useState(false);
  const [navPage,setNavPage]=useState(0); // pagination nav

  useEffect(()=>{
    const start=()=>{
      if(!window._fb){setTimeout(start,200);return;}
      window._fb.onAuth(async u=>{
        if(u){
          setUser(u);
          try{
            const snap=await window._fb.getDoc("users",u.uid);
            if(snap.exists()){const d=snap.data();setDog(d.dog);}
            else setOnboard(true);
          }catch{setOnboard(true);}
        }else{setUser(null);setDog(null);setOnboard(false);}
        setReady(true);
      });
    };
    if(window._fb)start();
    else window.addEventListener("fb-ready",start,{once:true});
  },[]);

  const logout=async()=>{await window._fb.signOut();setUser(null);setDog(null);setPage("home");};

  // Écran de chargement
  if(!ready) return <div style={{minHeight:"100vh",background:"linear-gradient(160deg,"+C.blue+","+C.purple+")",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20}}>
    <div style={{background:"white",borderRadius:28,padding:20,boxShadow:"0 8px 32px rgba(0,0,0,0.15)"}}><Mascot size={90}/></div>
    <p style={{color:"white",fontFamily:"Georgia,serif",fontSize:22}}>Zoomly</p>
    <Loader/>
  </div>;

  // AUTH EN PREMIER
  if(!user) return <AuthScreen onAuth={(u,isNew)=>{setUser(u);if(isNew)setOnboard(true);}}/>;
  if(onboard) return <Onboarding user={user} onDone={d=>{setDog(d);setOnboard(false);}}/>;
  if(!dog) return <div style={{padding:32,textAlign:"center",color:C.textL}}>Chargement…</div>;

  const pages={
    home:<PageHome dog={dog}/>,
    scanner:<PageScanner dog={dog}/>,
    sante:<PageSante dog={dog}/>,
    recettes:<PageRecettes dog={dog}/>,
    education:<PageEducation dog={dog}/>,
    balades:<PageBalades dog={dog}/>,
    carnet:<PageCarnetSante dog={dog}/>,
    rappels:<PageRappels dog={dog}/>,
    astro:<PageAstrologie dog={dog}/>,
    album:<PageAlbum dog={dog}/>,
    carte:<PageCarteId dog={dog} user={user}/>,
    journal:<PageJournal dog={dog}/>,
    chat:<PageChat dog={dog}/>,
    profil:<PageProfil dog={dog} user={user} onLogout={logout} onDogUpdate={d=>{setDog(d);}}/>,
  };

  // Nav paginée : 7 items par page
  const navItems1=NAVS.slice(0,7);
  const navItems2=NAVS.slice(7);
  const currentNav=navPage===0?navItems1:navItems2;

  return <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:C.blueL,fontFamily:"Nunito,sans-serif",position:"relative"}}>
    <div style={{paddingBottom:95,minHeight:"100vh",overflowY:"auto"}}>{pages[page]}</div>
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"white",borderTop:"1px solid "+C.blueM,zIndex:100,boxShadow:"0 -4px 20px rgba(74,127,224,0.15)"}}>
      <div style={{display:"flex",justifyContent:"space-around",padding:"8px 4px 4px"}}>
        {currentNav.map(n=><button key={n.id} onClick={()=>setPage(n.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,background:"none",border:"none",cursor:"pointer",color:page===n.id?C.blue:C.textL,padding:"0 2px",minWidth:0,flex:1}}>
          <div style={{padding:"3px 6px",borderRadius:10,background:page===n.id?C.blueL:"transparent",fontSize:16,transition:"background 0.2s"}}>{n.e}</div>
          <span style={{fontSize:8,fontWeight:page===n.id?800:500,whiteSpace:"nowrap"}}>{n.l}</span>
        </button>)}
        <button onClick={()=>setNavPage(p=>p===0?1:0)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,background:"none",border:"none",cursor:"pointer",color:C.textL,padding:"0 2px",flex:1}}>
          <div style={{padding:"3px 6px",borderRadius:10,fontSize:16}}>{"···"}</div>
          <span style={{fontSize:8,fontWeight:500}}>Plus</span>
        </button>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:6,padding:"4px 0 12px"}}>
        {[0,1].map(i=><div key={i} onClick={()=>setNavPage(i)} style={{width:i===navPage?20:6,height:6,borderRadius:99,background:i===navPage?C.blue:C.blueM,cursor:"pointer",transition:"all 0.3s"}}/>)}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
