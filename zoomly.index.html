/* ── Composants UI ─────────────────────────────────────── */
function Btn({children, onClick, disabled, outline, small, style={}}) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width:"100%", padding: small?"10px":"15px", borderRadius:18,
      border: outline ? "2px solid "+C.lavD : "none",
      background: disabled ? C.lavL : outline ? "transparent" : "linear-gradient(135deg,"+C.lavD+","+C.roseD+")",
      color: outline ? C.lavD : "white",
      fontWeight:800, fontSize: small?13:15, cursor:disabled?"not-allowed":"pointer",
      fontFamily:"Nunito,sans-serif", opacity:disabled?0.6:1, transition:"opacity 0.2s", ...style
    }}>{children}</button>
  );
}

function Inp({label, value, onChange, type="text", placeholder="", multiline, rows=3}) {
  const s = {width:"100%", padding:"13px 16px", borderRadius:16,
    border:"2px solid "+C.lavL, fontSize:14, color:C.text,
    fontFamily:"Nunito,sans-serif", outline:"none", background:"white",
    resize:"none"};
  return (
    <div style={{marginBottom:14}}>
      {label && <p style={{margin:"0 0 6px",fontSize:13,fontWeight:700,color:C.text}}>{label}</p>}
      {multiline
        ? <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={s}/>
        : <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={s}/>
      }
    </div>
  );
}

function Card({children, style={}}) {
  return <div style={{background:"white",borderRadius:24,padding:"16px 18px",marginBottom:14,boxShadow:"0 4px 20px rgba(200,180,232,0.2)",...style}}>{children}</div>;
}

function ScoreRing({score=0}) {
  const r=42, c=2*Math.PI*r;
  const col = score>75?C.mintD:score>40?C.peachD:C.roseD;
  return (
    <svg width={110} height={110} viewBox="0 0 100 100">
      <circle cx="50" cy="50" r={r} fill="none" stroke={C.lavL} strokeWidth="10"/>
      <circle cx="50" cy="50" r={r} fill="none" stroke={col} strokeWidth="10"
        strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c*(1-score/100)}
        transform="rotate(-90 50 50)"/>
      <text x="50" y="47" textAnchor="middle" fontSize="20" fontWeight="bold" fill={C.text} fontFamily="serif">{score}</text>
      <text x="50" y="60" textAnchor="middle" fontSize="9" fill={C.textL} fontFamily="sans-serif">/100</text>
    </svg>
  );
}

/* ── AUTH ─────────────────────────────────────────────── */
function AuthScreen({onAuth}) {
  const [mode,setMode] = useState("login");
  const [email,setEmail] = useState("");
  const [pw,setPw] = useState("");
  const [pw2,setPw2] = useState("");
  const [err,setErr] = useState("");
  const [load,setLoad] = useState(false);

  const handle = async () => {
    setErr(""); setLoad(true);
    try {
      if(mode==="register") {
        if(pw!==pw2){setErr("Mots de passe différents.");setLoad(false);return;}
        if(pw.length<6){setErr("6 caractères minimum.");setLoad(false);return;}
        const c = await auth.createUserWithEmailAndPassword(email,pw);
        onAuth(c.user,true);
      } else {
        const c = await auth.signInWithEmailAndPassword(email,pw);
        onAuth(c.user,false);
      }
    } catch(e) {
      const m={"auth/email-already-in-use":"Email déjà utilisé.","auth/invalid-email":"Email invalide.","auth/wrong-password":"Mot de passe incorrect.","auth/user-not-found":"Aucun compte trouvé.","auth/invalid-credential":"Email ou mot de passe incorrect."};
      setErr(m[e.code]||"Erreur : "+e.message);
    }
    setLoad(false);
  };

  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px"}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <Mascot size={90}/>
        <h1 style={{color:C.text,fontFamily:"Georgia,serif",margin:"12px 0 4px",fontSize:32}}>Zoomly</h1>
        <p style={{color:C.textL,fontSize:14}}>Le compagnon santé de ton chien 🐾</p>
      </div>
      <div style={{width:"100%",maxWidth:400,background:"white",borderRadius:28,padding:28,boxShadow:"0 8px 40px rgba(200,180,232,0.25)"}}>
        <div style={{display:"flex",background:C.bg,borderRadius:16,padding:4,marginBottom:22}}>
          {["login","register"].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setErr("");}} style={{flex:1,padding:"10px",borderRadius:13,border:"none",cursor:"pointer",background:mode===m?"white":"transparent",color:mode===m?C.lavD:C.textL,fontWeight:700,fontSize:13,fontFamily:"Nunito,sans-serif",transition:"all 0.2s"}}>
              {m==="login"?"Connexion":"Créer un compte"}
            </button>

/* ── IA helper ────────────────────────────────────────── */
async function callAI(system, userMsg, imgData=null) {
  const content = imgData
    ? [{type:"image",source:{type:"base64",media_type:imgData.type,data:imgData.data}},{type:"text",text:userMsg}]
    : userMsg;
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system,messages:[{role:"user",content}]})
  });
  const data = await res.json();
  return data.content?.[0]?.text||"";
}

/* ── SCANNER ──────────────────────────────────────────── */
function PageScanner({dog,premium,onPremium}) {
  const [query,setQuery] = useState("");
  const [result,setResult] = useState(null);
  const [load,setLoad] = useState(false);
  const [preview,setPreview] = useState(null);
  const fileRef = useRef(null);

  if(!premium) return (
    <div style={{padding:"40px 24px",textAlign:"center"}}>
      <span style={{fontSize:64}}>🔍</span>
      <h2 style={{color:C.text,fontFamily:"Georgia,serif",margin:"16px 0 8px"}}>Scanner d'aliments</h2>
      <p style={{color:C.textL,fontSize:14,lineHeight:1.6,marginBottom:24}}>Analyse une photo ou des ingrédients pour {dog.name}.</p>
      <PremiumBanner onUpgrade={onPremium}/>
    </div>
  );

  const handlePhoto = e => {
    const file = e.target.files?.[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      const b64 = ev.target.result.split(",")[1];
      setPreview(ev.target.result); setLoad(true); setResult(null);
      try {
        const sys = 'Expert nutrition canine. UNIQUEMENT JSON: {"identified":"aliment","level":"safe"/"caution"/"danger","score":0-100,"verdict":"texte","good":["point"],"bad":["point"],"advice":"conseil","raceNote":"note race"}';
        const txt = await callAI(sys,"Chien: "+dog.race+", "+dog.age+" "+dog.ageUnit+", "+dog.weight+"kg.",{type:file.type,data:b64});
        const p = JSON.parse(txt);
        if(p.identified) setQuery(p.identified);
        setResult(p);
      } catch { setResult({level:"caution",score:50,verdict:"Impossible d'analyser",good:[],bad:[],advice:"Essaie avec du texte"}); }
      setLoad(false);
    };
    reader.readAsDataURL(file);
  };

  const analyze = async () => {
    if(!query.trim()||load) return;
    setLoad(true); setResult(null); setPreview(null);
    try {
      const sys = 'Expert nutrition canine. UNIQUEMENT JSON: {"level":"safe"/"caution"/"danger","score":0-100,"verdict":"texte","good":["point"],"bad":["point"],"advice":"conseil","raceNote":"note race"}';
      const txt = await callAI(sys,"Chien: "+dog.race+", "+dog.age+" "+dog.ageUnit+", "+dog.weight+"kg. Aliment: "+query);
      setResult(JSON.parse(txt));
    } catch { setResult({level:"caution",score:50,verdict:"Erreur",good:[],bad:["Connexion impossible"],advice:"Réessaie !"}); }
    setLoad(false);
  };

  const lc={safe:C.mintD,caution:C.peachD,danger:C.red};
  const lb={safe:"#E8F8F0",caution:"#FFF3E0",danger:"#FFEBEB"};
  const ll={safe:"✅ Sûr pour "+dog.name,caution:"⚠️ Avec modération",danger:"🚫 Dangereux"};

  return (
    <div style={{padding:"24px 16px"}}>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{display:"none"}}/>
      <h2 style={{color:C.text,fontFamily:"Georgia,serif",margin:"0 0 6px"}}>Scanner 🔍</h2>
      <p style={{color:C.textL,fontSize:13,margin:"0 0 16px"}}>Vérifie si un aliment convient à {dog.name}</p>

      <div onClick={()=>fileRef.current.click()} style={{background:"linear-gradient(135deg,"+C.lavL+","+C.rose+"40)",borderRadius:20,padding:"18px",marginBottom:14,cursor:"pointer",display:"flex",alignItems:"center",gap:14,border:"2px dashed "+C.lav}}>
        {preview ? <img src={preview} style={{width:60,height:60,borderRadius:12,objectFit:"cover"}}/> : <span style={{fontSize:36}}>📷</span>}
        <div>
          <p style={{margin:"0 0 2px",fontWeight:700,color:C.text,fontSize:15}}>{preview?"Changer la photo":"📷 Prendre une photo"}</p>
          <p style={{margin:0,fontSize:12,color:C.textL}}>L'IA identifie l'aliment auto</p>
        </div>
      </div>

      <Card>
        <p style={{margin:"0 0 8px",fontSize:12,color:C.textL,fontWeight:600}}>Ou tape les ingrédients :</p>
        <Inp multiline value={query} onChange={setQuery} placeholder={"Ex: chocolat\nFarine de blé, poulet 15%..."} rows={3}/>
        <Btn onClick={analyze} disabled={load||!query.trim()}>{load?"Analyse…":"🔍 Analyser"}</Btn>
      </Card>

      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {["Chocolat","Avocat","Poulet cuit","Raisin","Carotte","Fromage"].map(f=>(
          <button key={f} onClick={()=>setQuery(f)} style={{background:C.lavL,border:"none",borderRadius:20,padding:"8px 14px",color:C.lavD,fontSize:12,fontWeight:700,cursor:"pointer"}}>{f}</button>
        ))}
      </div>

      {load && <p style={{textAlign:"center",color:C.textL,padding:"20px 0"}}>🔍 Analyse en cours…</p>}
      {result && !load && (
        <Card>
          <div style={{background:lb[result.level]||"#FFF3E0",borderRadius:16,padding:"14px 18px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={{margin:"0 0 4px",fontWeight:800,color:lc[result.level]||C.peachD,fontSize:16}}>{ll[result.level]||"⚠️ À vérifier"}</p>
              <p style={{margin:0,fontSize:13,color:C.text}}>{result.verdict}</p>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:26,fontWeight:900,color:lc[result.level]||C.peachD}}>{result.score}</div>
              <div style={{fontSize:10,color:C.textL}}>/100</div>
            </div>
          </div>
          <div style={{background:C.bg,borderRadius:99,height:10,marginBottom:14,overflow:"hidden"}}>
            <div style={{background:lc[result.level]||C.peachD,width:result.score+"%",height:"100%",borderRadius:99}}/>

  );
}

              <span style={{fontSize:12,fontWeight:600,color:syms.includes(s.id)?C.lavD:C.textL}}>{s.l}</span>
            </button>
          ))}
        </div>
        <Inp value={other} onChange={setOther} placeholder="Autre symptôme…"/>
        <Btn onClick={evaluate} disabled={load||(syms.length===0&&!other.trim())}>{load?"Évaluation…":"🏥 Évaluer"}</Btn>
      </Card>
      {result && (
        <Card>
          <div style={{background:gb[result.color]||"#FFF3E0",borderRadius:16,padding:"16px 18px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <p style={{margin:0,fontWeight:800,color:gc[result.color]||C.peachD,fontSize:16}}>{result.title}</p>
              <span style={{background:gc[result.color],color:"white",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:700}}>Gravité {result.gravity}</span>
            </div>
            <p style={{margin:0,fontSize:13,color:C.text,lineHeight:1.5}}>{result.summary}</p>
          </div>
          {result.raceNote && <div style={{background:C.lavL,borderRadius:14,padding:"10px 14px",marginBottom:12}}><p style={{margin:0,fontSize:12,color:C.lavD}}>🧬 {result.raceNote}</p></div>}
          {result.actions?.map((a,i)=>(
            <div key={i} style={{display:"flex",gap:10,marginBottom:8}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:C.lavL,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12,fontWeight:700,color:C.lavD}}>{i+1}</div>
              <p style={{margin:0,fontSize:13,color:C.text,lineHeight:1.5}}>{a}</p>
            </div>
          ))}
          {result.vet && <div style={{background:"#FFEBEE",borderRadius:14,padding:"12px 16px",marginTop:10}}><p style={{margin:0,fontWeight:700,color:C.red,fontSize:13}}>🩺 Vétérinaire — {result.vetDelay}</p></div>}
          <p style={{margin:"12px 0 0",fontSize:11,color:C.textL,textAlign:"center"}}>⚠️ Ne remplace pas un diagnostic vétérinaire.</p>
        </Card>
      )}
    </div>
  );
}

  {title:"Soupe légumes du soir",emoji:"🥕",time:"15 min",diff:"Facile",ingredients:["1 courgette","1 carotte","100g riz cuit","500ml eau"],steps:["Couper les légumes en dés","Cuire 10 min dans l'eau","Mixer grossièrement","Mélanger avec le riz"]},
  {title:"Friandises sardine & persil",emoji:"🐟",time:"25 min",diff:"Moyen",ingredients:["1 boîte sardines à l'eau","100g farine d'avoine","1 œuf","persil frais"],steps:["Écraser les sardines","Mélanger farine et œuf","Étaler et découper","Cuire 20 min à 160°C"]},
];

function PageRecettes({dog}) {
  const [sel,setSel] = useState(null);
  const [aiQ,setAiQ] = useState("");
  const [aiRes,setAiRes] = useState(null);
  const [load,setLoad] = useState(false);

  const generate = async () => {
    setLoad(true); setAiRes(null);
    try {
      const sys = 'Chef cuisinier canin. UNIQUEMENT JSON: {"title":"nom","emoji":"🍗","time":"X min","diff":"Facile/Moyen","ingredients":["ingrédient"],"steps":["étape"],"tip":"conseil","raceNote":"note race"}. Jamais: chocolat, oignon, ail, raisin, avocat, xylitol.';
      const txt = await callAI(sys,"Chien: "+dog.race+", "+dog.age+" "+dog.ageUnit+", "+dog.weight+"kg. Demande: "+aiQ);
      setAiRes(JSON.parse(txt));
    } catch { setAiRes({title:"Erreur",emoji:"❌",time:"—",diff:"—",ingredients:[],steps:["Connexion impossible. Réessaie !"],tip:""}); }
    setLoad(false);
  };

  if(sel) return (
    <div style={{padding:"24px 16px"}}>
      <button onClick={()=>setSel(null)} style={{background:"none",border:"none",cursor:"pointer",color:C.lavD,fontWeight:700,fontSize:14,marginBottom:16,padding:0}}>← Retour</button>
      <div style={{textAlign:"center",marginBottom:20}}>
        <span style={{fontSize:52}}>{sel.emoji}</span>
        <h2 style={{color:C.text,fontFamily:"Georgia,serif",margin:"8px 0 8px"}}>{sel.title}</h2>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <span style={{background:C.lavL,color:C.lavD,borderRadius:20,padding:"4px 14px",fontSize:12,fontWeight:700}}>⏱ {sel.time}</span>
          <span style={{background:C.mint,color:C.mintD,borderRadius:20,padding:"4px 14px",fontSize:12,fontWeight:700}}>{sel.diff}</span>
        </div>
      </div>
      <Card><p style={{margin:"0 0 12px",fontWeight:700,color:C.text}}>🛒 Ingrédients</p>{sel.ingredients.map((ing,i)=><p key={i} style={{margin:"6px 0",fontSize:14,color:C.text}}>• {ing}</p>)}</Card>
      <Card>
        <p style={{margin:"0 0 12px",fontWeight:700,color:C.text}}>👩‍🍳 Préparation</p>
        {sel.steps.map((s,i)=>(
          <div key={i} style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}}>
            <div style={{width:26,height:26,borderRadius:"50%",background:C.lav,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12,fontWeight:800,color:"white"}}>{i+1}</div>
            <p style={{margin:0,fontSize:14,color:C.text,lineHeight:1.5}}>{s}</p>
          </div>

      {sel.tip && <div style={{background:C.lavL,borderRadius:16,padding:"12px 16px",marginBottom:10}}><p style={{margin:0,fontSize:13,color:C.lavD,fontWeight:600}}>💡 {sel.tip}</p></div>}
      {sel.raceNote && <div style={{background:C.mint,borderRadius:16,padding:"12px 16px"}}><p style={{margin:0,fontSize:13,color:C.mintD,fontWeight:600}}>🧬 {sel.raceNote}</p></div>}
    </div>
  );

  return (
    <div style={{padding:"24px 16px"}}>
      <h2 style={{color:C.text,fontFamily:"Georgia,serif",margin:"0 0 6px"}}>Recettes 🍳</h2>
      <p style={{color:C.textL,fontSize:13,margin:"0 0 16px"}}>Fait maison pour {dog.name}</p>
      <div style={{background:"linear-gradient(135deg,"+C.lavL+","+C.rose+"40)",borderRadius:20,padding:16,marginBottom:20}}>
        <p style={{margin:"0 0 10px",fontWeight:700,color:C.text,fontSize:14}}>✨ Génère une recette avec l'IA</p>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <input value={aiQ} onChange={e=>setAiQ(e.target.value)} placeholder="Ex: légère au saumon…" style={{flex:1,border:"2px solid "+C.lavL,borderRadius:14,padding:"10px 14px",fontSize:13,color:C.text,fontFamily:"Nunito,sans-serif",outline:"none",background:"white"}}/>
          <button onClick={generate} disabled={load||!aiQ.trim()} style={{padding:"10px 18px",borderRadius:14,border:"none",background:C.lavD,color:"white",fontWeight:800,fontSize:13,cursor:"pointer",opacity:load||!aiQ.trim()?0.6:1}}>{load?"…":"Go"}</button>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {["Sans gluten","Riche en protéines","Légère","Friandises"].map(s=>(
            <button key={s} onClick={()=>setAiQ(s)} style={{background:"white",border:"none",borderRadius:20,padding:"6px 12px",color:C.lavD,fontSize:11,fontWeight:700,cursor:"pointer"}}>{s}</button>
          ))}
        </div>
        {load && <p style={{textAlign:"center",color:C.textL,margin:"12px 0 0",fontSize:13}}>Génération…</p>}
        {aiRes && !load && (
          <div onClick={()=>setSel(aiRes)} style={{background:"white",borderRadius:16,padding:14,marginTop:12,cursor:"pointer",boxShadow:"0 2px 8px rgba(200,180,232,0.2)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:28}}>{aiRes.emoji}</span>
              <div><p style={{margin:0,fontWeight:700,color:C.text}}>{aiRes.title}</p><p style={{margin:0,fontSize:12,color:C.textL}}>{aiRes.time} · Appuie pour voir</p></div>

          <span style={{fontSize:32}}>{r.emoji}</span>
          <div style={{flex:1}}><p style={{margin:"0 0 4px",fontWeight:700,color:C.text}}>{r.title}</p><p style={{margin:0,fontSize:12,color:C.textL}}>{r.time} · {r.diff}</p></div>
          <span style={{color:C.lavD,fontSize:20}}>›</span>
        </div>
      ))}
    </div>
  );
}

/* ── CHAT ─────────────────────────────────────────────── */
function PageChat({dog}) {
  const [msgs,setMsgs] = useState([{r:"a",t:"Woof ! 🐾 Je suis Zoomly, ton coach canin IA. Je connais "+dog.name+" ("+dog.race+", "+dog.age+" "+dog.ageUnit+") — pose-moi tes questions !"}]);
  const [inp,setInp] = useState("");
  const [load,setLoad] = useState(false);
  const bot = useRef(null);
  useEffect(()=>bot.current?.scrollIntoView({behavior:"smooth"}),[msgs]);

  const send = async () => {
    if(!inp.trim()||load) return;
    const msg=inp.trim(); setInp("");
    setMsgs(p=>[...p,{r:"u",t:msg}]); setLoad(true);
    try {
      const history = msgs.map(m=>({role:m.r==="a"?"assistant":"user",content:m.t}));
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,
          system:"Tu es Zoomly, coach canin IA bienveillant. Réponds en français avec emojis. Chien: "+dog.name+", "+dog.race+", "+dog.age+" "+dog.ageUnit+", "+dog.weight+"kg. Notes: "+(dog.notes||"aucune")+". Adapte conseils à la race. Réponses courtes.",
          messages:[...history,{role:"user",content:msg}]})
      });
      const data = await res.json();
      setMsgs(p=>[...p,{r:"a",t:data.content?.[0]?.text||"Oops ! Réessaie 🐾"}]);
    } catch { setMsgs(p=>[...p,{r:"a",t:"Connexion impossible 🐾"}]); }
    setLoad(false);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 130px)"}}>
      <div style={{padding:"24px 16px 12px"}}>
        <h2 style={{color:C.text,fontFamily:"Georgia,serif",margin:"0 0 4px"}}>Coach IA 🤖</h2>
        <p style={{color:C.textL,fontSize:13,margin:0}}>Conseils adaptés à {dog.race}</p>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 16px"}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.r==="u"?"flex-end":"flex-start",marginBottom:12,alignItems:"flex-end",gap:8}}>
            {m.r==="a" && <Mascot size={32}/>}
            <div style={{maxWidth:"78%",background:m.r==="u"?C.lav:"white",color:C.text,borderRadius:m.r==="u"?"20px 20px 4px 20px":"20px 20px 20px 4px",padding:"12px 16px",fontSize:14,lineHeight:1.5,boxShadow:"0 2px 8px rgba(200,180,232,0.2)"}}>{m.t}</div>
          </div>
        ))}
        {load && (
          <div style={{display:"flex",gap:8,alignItems:"flex-end",marginBottom:12}}>
            <Mascot size={32}/>
            <div style={{background:"white",borderRadius:"20px 20px 20px 4px",padding:"14px 18px",boxShadow:"0 2px 8px rgba(200,180,232,0.2)"}}>
              <span style={{display:"inline-flex",gap:4}}>
                {[0,1,2].map(i=><span key={i} style={{width:8,height:8,borderRadius:"50%",background:C.lav,display:"inline-block",animation:"bounce 1s ease "+i*0.2+"s infinite"}}/>)}
              </span>
            </div>
          </div>
        )}
        <div ref={bot}/>
      </div>
      <div style={{padding:"6px 16px",display:"flex",gap:8,overflowX:"auto"}}>
        {["Durée de balade ?","Alimentation équilibrée ?","Tire en laisse"].map(s=>(
          <button key={s} onClick={()=>setInp(s)} style={{whiteSpace:"nowrap",background:C.lavL,border:"none",borderRadius:20,padding:"8px 14px",color:C.lavD,fontSize:12,fontWeight:700,cursor:"pointer"}}>{s}</button>
        ))}
      </div>
      <div style={{padding:"10px 16px 24px",display:"flex",gap:10}}>
        <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Pose ta question…"
          style={{flex:1,padding:"14px 18px",borderRadius:99,border:"2px solid "+C.lavL,fontSize:14,outline:"none",color:C.text,fontFamily:"Nunito,sans-serif",background:"white"}}/>
        <button onClick={send} style={{width:48,height:48,borderRadius:"50%",background:"linear-gradient(135deg,"+C.lav+","+C.rose+")",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  );
}

/* ── NAV ──────────────────────────────────────────────── */
const NAVS = [
  {id:"home",l:"Accueil",e:"🏠"},
  {id:"scanner",l:"Scanner",e:"🔍",prem:true},
  {id:"sante",l:"Santé",e:"🏥",prem:true},
  {id:"recettes",l:"Recettes",e:"🍳"},
  {id:"chat",l:"Coach IA",e:"🤖"},
  {id:"profil",l:"Profil",e:"👤"},
];

/* ── APP ──────────────────────────────────────────────── */
function App() {
  const [user,setUser] = useState(null);
  const [dog,setDog] = useState(null);
  const [pageLoad,setPageLoad] = useState(true);
  const [errMsg,setErrMsg] = useState("");
  const [page,setPage] = useState("home");
  const [premium,setPremium] = useState(false);
  const [showPrem,setShowPrem] = useState(false);
  const [onboard,setOnboard] = useState(false);

  useEffect(()=>{
    if(!auth){setErrMsg("Firebase non initialisé. Recharge la page.");setPageLoad(false);return;}
    const timer = setTimeout(()=>{setErrMsg("Connexion lente. Vérifie ton internet.");setPageLoad(false);},10000);
    const unsub = auth.onAuthStateChanged(async u=>{
      clearTimeout(timer);
      try {
        if(u){
          setUser(u);
          const snap = await db.collection("users").doc(u.uid).get();
          if(snap.exists){const d=snap.data();setDog(d.dog);setPremium(d.dog?.premium||false);setOnboard(false);}
          else setOnboard(true);
        } else {setUser(null);setDog(null);setOnboard(false);}
      } catch(e){setErrMsg("Erreur Firestore: "+e.message);}
      setPageLoad(false);
    }, e=>{clearTimeout(timer);setErrMsg("Erreur Auth: "+e.message);setPageLoad(false);});
    return ()=>{clearTimeout(timer);unsub();};
  },[]);

  const logout = async()=>{await auth.signOut();setUser(null);setDog(null);setPremium(false);setPage("home");};
  const upgrade = async()=>{
    setPremium(true);setShowPrem(false);
    if(user) await db.collection("users").doc(user.uid).update({"dog.premium":true});
  };

  if(pageLoad) return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <Mascot size={90}/>
      <p style={{color:C.lavD,fontFamily:"Georgia,serif",fontSize:18}}>Chargement…</p>
      <p style={{color:C.textL,fontSize:12}}>Connexion à Firebase…</p>
    </div>
  );

  if(errMsg) return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:24}}>
      <span style={{fontSize:48}}>⚠️</span>
      <h2 style={{color:C.text,fontFamily:"Georgia,serif",textAlign:"center"}}>Erreur</h2>
      <p style={{color:C.textL,fontSize:14,textAlign:"center",maxWidth:300}}>{errMsg}</p>
      <button onClick={()=>window.location.reload()} style={{padding:"14px 28px",borderRadius:18,border:"none",background:"linear-gradient(135deg,"+C.lavD+","+C.roseD+")",color:"white",fontWeight:800,fontSize:15,cursor:"pointer"}}>🔄 Réessayer</button>
    </div>
  );

  if(!user) return <AuthScreen onAuth={(u,isNew)=>{setUser(u);if(isNew)setOnboard(true);}}/>;
  if(onboard) return <Onboarding user={user} onDone={d=>{setDog(d);setOnboard(false);}}/>;
  if(!dog) return <div style={{padding:32,textAlign:"center",color:C.textL}}>Chargement du profil…</div>;

  const pp={dog,premium,onPremium:()=>setShowPrem(true)};
  const pages={
    home:<PageHome {...pp}/>,
    scanner:<PageScanner {...pp}/>,
    sante:<PageSante {...pp}/>,
    recettes:<PageRecettes dog={dog}/>,
    chat:<PageChat dog={dog}/>,
    profil:<PageProfil dog={dog} user={user} premium={premium} onLogout={logout}/>,
  };

  return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:C.bg,fontFamily:"Nunito,sans-serif",position:"relative"}}>
      <div style={{paddingBottom:90,minHeight:"100vh",overflowY:"auto"}}>{pages[page]}</div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"white",borderTop:"1px solid "+C.lavL,display:"flex",justifyContent:"space-around",padding:"8px 0 20px",zIndex:100,boxShadow:"0 -4px 20px rgba(200,180,232,0.2)"}}>
        {NAVS.map(n=>(
          <button key={n.id} onClick={()=>setPage(n.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",color:page===n.id?C.lavD:C.textL,position:"relative",padding:"0 4px",minWidth:0}}>
            <div style={{padding:"4px 8px",borderRadius:14,background:page===n.id?C.lavL:"transparent",fontSize:20}}>{n.e}</div>
            <span style={{fontSize:9,fontWeight:page===n.id?800:400,whiteSpace:"nowrap"}}>{n.l}</span>
            {n.prem&&!premium&&<span style={{position:"absolute",top:0,right:2,width:7,height:7,borderRadius:"50%",background:C.roseD}}/>}
          </button>
        ))}
      </div>
      {showPrem && <PremiumModal onClose={()=>setShowPrem(false)} onUpgrade={upgrade}/>}
    </div>
  );
}

// Attendre Firebase avant de démarrer React
function startApp() {
  if(window._firebaseError) {
    document.getElementById("root").innerHTML = '<div style="padding:40px;text-align:center;color:#E05050;font-family:Nunito,sans-serif"><p style="font-size:48px">⚠️</p><p style="font-size:16px;margin-top:16px">Erreur Firebase:<br/>'+window._firebaseError+'</p><button onclick="location.reload()" style="margin-top:20px;padding:14px 28px;border-radius:18px;border:none;background:linear-gradient(135deg,#9B7FCC,#E07FA0);color:white;font-weight:800;font-size:15px;cursor:pointer">🔄 Réessayer</button></div>';
    return;
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
}

if(window._firebaseReady) {
  startApp();
} else {
  document.addEventListener("firebase-ready", startApp);
  // Timeout secours 12s
  setTimeout(()=>{
    if(!window._firebaseReady) {
      window._firebaseError = "Timeout - vérifie ta connexion internet";
      startApp();
    }
  }, 12000);
}
</script>
